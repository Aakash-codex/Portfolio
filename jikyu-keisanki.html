<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jikyu Keisanki - Hourly Wage Calculator">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <title>Jikyu Keisanki | Hourly Wage Calculator</title>
    <style>
      .calculator-section {
        padding: 100px 20px;
        background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
      }
      .calculator-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 30px 25px;
        border-radius: 16px;
        background: linear-gradient(145deg, #1a1a1a, #000000);
        box-shadow: 0 6px 24px rgba(2, 183, 243, 0.28);
      }
      .calculator-grid {
        display: grid;
        gap: 18px;
      }
      .calc-label {
        font-size: 0.95rem;
        color: #d4d2cd;
      }
      .calc-input-group {
        display: flex;
        gap: 10px;
      }
      .calc-input,
      .calc-select {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #050505;
        color: #ffffff;
        font-size: 0.95rem;
        outline: none;
      }
      .calc-input:focus,
      .calc-select:focus {
        border-color: #02b7f3;
      }
      .calc-button {
        margin-top: 10px;
        padding: 12px 18px;
        border-radius: 999px;
        border: none;
        background: #02b7f3;
        color: #000000;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.25s ease, transform 0.25s ease;
      }
      .calc-button:hover {
        background: #0099d6;
        transform: translateY(-2px);
      }
      .calc-result {
        margin-top: 20px;
        font-size: 1.1rem;
        color: #d4d2cd;
      }
      .calc-result strong {
        color: #02b7f3;
      }
      @media (max-width: 600px) {
        .calculator-container {
          padding: 24px 18px;
        }
        .section-title {
          font-size: 1.8rem;
          padding-left: 20px;
        }
        .section-title::after {
          left: 20px;
        }
        .calc-input-group {
          flex-direction: column;
        }
        .calc-label {
          font-size: 0.9rem;
        }
      }
      @media (max-width: 480px) {
        .calculator-section {
          padding: 60px 15px;
        }
        .calc-button {
          width: 100%;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <header id="top">
      <h2><a href="index.html" class="logotext">Aakash</a></h2>
      <nav>
        <a href="index.html"><span>Home</span></a>
        <a href="index.html#about"><span>About</span></a>
        <a href="index.html#news"><span>News</span></a>
        <a href="index.html#projects"><span>Projects</span></a>
        <a href="index.html#skills"><span>Skills</span></a>
        <a href="index.html#contact"><span>Contact</span></a>
      </nav>
    </header>

    <main>
      <section class="calculator-section">
        <h2 class="section-title">Jikyu Keisanki (Hourly Wage Calculator)</h2>
        <div class="calculator-container">
          <div class="calculator-grid">
            <div>
              <label class="calc-label" for="hourlyWage">Hourly wage (¥)</label>
              <input id="hourlyWage" type="number" min="0" class="calc-input" placeholder="例: 1200" />
            </div>

            <div>
              <label class="calc-label">Work time</label>
              <div class="calc-input-group">
                <input id="hours" type="number" min="0" class="calc-input" placeholder="Hours" />
                <input id="minutes" type="number" min="0" max="59" class="calc-input" placeholder="Minutes" />
              </div>
            </div>

            <div>
              <label class="calc-label" for="days">Number of days</label>
              <input id="days" type="number" min="1" value="1" class="calc-input" />
            </div>

            <button id="calcBtn" class="calc-button">Calculate</button>

            <div id="result" class="calc-result">
              Enter your wage and time to see total pay.
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const wageInput = document.getElementById('hourlyWage');
        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const daysInput = document.getElementById('days');
        const resultEl = document.getElementById('result');
        const btn = document.getElementById('calcBtn');

        function formatYen(value) {
          return value.toLocaleString('ja-JP', { style: 'currency', currency: 'JPY', maximumFractionDigits: 0 });
        }

        btn.addEventListener('click', function () {
          const wage = Number(wageInput.value);
          const hours = Number(hoursInput.value);
          const minutes = Number(minutesInput.value);
          const days = Number(daysInput.value || 1);

          if (!wage || wage <= 0 || hours < 0 || minutes < 0 || minutes >= 60 || days <= 0) {
            resultEl.textContent = 'Please enter a valid wage, time, and number of days.';
            return;
          }

          const totalHoursPerDay = hours + minutes / 60;
          const totalHours = totalHoursPerDay * days;
          const totalPay = Math.round(totalHours * wage);

          resultEl.innerHTML =
            'Total time: <strong>' +
            totalHours.toFixed(2) +
            ' h</strong><br/>Total pay: <strong>' +
            formatYen(totalPay) +
            '</strong>';
        });
      })();
    </script>
  </body>
</html>
